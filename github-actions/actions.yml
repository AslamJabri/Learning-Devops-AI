name: first-workflow
on: [push,pull]
env:
  MONGO_DB_NAME: db-demo
  MONGO_DB_PASSWORD: ${{ secrets.MONGO_DB_PASSWORD }}
jobs:
  first-job:
    continue-on-error: true
    strategy:
    matrix:
        node-version: [12,14,16]
        include: 
        - node-version: 18
          os: ubuntu-latest
        exclude:
        - node-version: 12
          os: windows-latest
    environment: testing
    env:
      MONGO_DB_NAME: db-demo-test # this will override the value
      PORT: 8080
    runs-on: ubuntu-latest
    steps:
      - name: Print Greeting
        run: echo "Hello World!"
      - name: last job
        run: echo "Done Job bye!"
      - name: Get Code
        uses: actions/checkout@v6.0.2
      - name: Install Nodejs
        uses: actions/setup-node@v6.2.0
        with:
            node-version: ${{ matrix.node-version }}
      - name: check the repo
        run: ls -l
      - name: check the node version
        run: node --version
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Output Information
        run: | 
          echo "MONGO_DB_NAME: ${{ env.MONGO_DB_NAME }}"
  build:
    strategy:
      matrix:
        node-version: [12,14,16]
        os: [ubuntu-latest,macos]
    runs-on: ${{ matrix.os }}
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Caching dependencies
        id: cache
        uses: actions/cache@v3
        with:
          path: node_modules
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: install Dependencies
        if: steps.cache.output.cache-hit != 'true'
        run: npm ci
      - name: Build Website
        run: npm run build
      - name: Test code
        continue-on-error: true
        id: run-test
        run: npm run test
      - name: Upload test report
        if: failure() && steps.run-test.outcome == 'failure'
        uses: actions/upload-artifact@v3
        with:
          name: test-report
          path: test.json
      - name: Publish JS filename
        id: publish
        run: find dist/assets/*.js -type f -execdir echo 'script-file={}' >> $GITHUB_OUTPUT ';'
      - name: Upload artificats
        uses: actions/upload-artifact@v3
        with:
          name: dist-files
          path: dist
  deploy:
    outputs:
      result: ${{ steps.set-result.output.step-result }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Caching dependencies
        uses: actions/cache@v3
        with:
          path: node_modules
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Get build artifact
        uses: actions/download-artifact@v3
        with:
          name: dist-files
      - name: output-filename
        run: echo "${{ needs.build.outputs.script-file }}"
      - name: Set result output
        id: set-result
        run: echo "::set-output name=step-result::success"
  report:
    needs: [first-job, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      
      - name: Failure information
        run: | 
          echo " The job has been failed"
          echo "${{ toJSON(github) }}"

  reusable-workflow-deploy:
    runs-on: ubuntu-latest
    uses: ./.github/workflows/reusable-workflow.yml
    with:
      artifact-name: dist-files
    secrets: 
      some-secret: ${{ secrets.some-secret }}
    
